[package]
name = "virdant"
version = "0.3.0"
edition = "2024"
autobins = false
default-run = "vir"

[dependencies]
anyhow = "1.0.98"
atoi = "2.0.0"
bstr = "1.12.0"
clap = { version = "4.5.46", features = ["derive"] }
defile = "0.2.1"
hashbrown = "0.15.4"
indexmap = "2.13.0"
internment = { version = "0.8.6", features = ["arc"] }
json = "0.12.4"
lalrpop-util = { version = "0.22.2", features = ["lexer"] }
logos = "0.15.1"
nix = { version = "0.31.2", features = ["process"] }
paste = "1.0.15"
serde_json = "1.0.149"
tokio = { version = "=1.49.0", features = ["macros", "rt-multi-thread", "io-std", "sync"] }
tower-lsp = "0.20.0"
tracing = "0.1.41"

[build-dependencies]
lalrpop = { version = "0.22.2" }

[[bin]]
name = "vir"
path = "src/bin/vir.rs"

[[bin]]
name = "vir-ir"
path = "src/bin/virir.rs"

[[bin]]
name = "vir-lsp"
path = "src/bin/virlsp.rs"
