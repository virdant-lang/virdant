name: Release

# Triggered by pushing a tag named like v0.3.0.
# Produces the toolchain archives for various host targets,
# generates .sha256 sidecars, and attaches them all to a GitHub
# release whose tag matches the download URLs virn expects.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed by `gh release create`

jobs:
  # Build the two Linux targets on an Ubuntu runner.
  # aarch64 is cross-compiled via `cross`, which needs Docker.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update
          rustup toolchain install 1.88.0
          rustup default 1.88.0
          rustup target add x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Set version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build artifacts
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: .github/workflows/build-release.sh "$VER" linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-assets/
          if-no-files-found: error

  # Build the two macOS targets on a macOS runner.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update
          rustup toolchain install 1.88.0
          rustup default 1.88.0
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Set version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build artifacts
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: .github/workflows/build-release.sh "$VER" macos

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release-assets/
          if-no-files-found: error

  # Collect everything and publish the release.
  publish:
    needs: [linux, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List artifacts
        run: ls -l release-assets/

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          gh release create "$VER" \
            --title "$VER" \
            --notes "Release $VER" \
            --verify-tag \
            release-assets/*.tar.gz \
            release-assets/*.tar.gz.sha256

      - name: Publish version-substituted install.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          # Bake the concrete version into the placeholder, then attach
          # the result as a release asset named install.sh so it has a
          # stable per-release URL.
          sed "s/^VERSION=\"<latest>\"$/VERSION=\"$VER\"/" \
            virn/install.sh > install.sh
          gh release upload "$VER" install.sh --clobber
