name: Release

# Triggered by pushing a tag named like v0.3.0.
# Produces the toolchain archive for the x86_64 Linux target,
# generates a .sha256 sidecar, and attaches it to a GitHub
# release whose tag matches the download URLs.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed by `gh release create`

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup update
          rustup toolchain install 1.88.0
          rustup default 1.88.0
          rustup target add x86_64-unknown-linux-gnu

      - name: Set version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build artifacts
        env:
          VER: ${{ steps.ver.outputs.version }}
        run: .github/workflows/build-release.sh "$VER" linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: release-assets/
          if-no-files-found: error

  # Collect everything and publish the release.
  publish:
    needs: [linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: ver
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: List artifacts
        run: ls -l release-assets/

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER: ${{ steps.ver.outputs.version }}
        run: |
          gh release create "$VER" \
            --title "$VER" \
            --notes "Release $VER" \
            --verify-tag \
            release-assets/*.tar.gz \
            release-assets/*.tar.gz.sha256
